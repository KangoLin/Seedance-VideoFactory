<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Video Batch Console</title>
  <style>
    :root {
      --bg: #f5f7fa; --panel: #fff; --line: #d9e0e8; --text: #16202a;
      --muted: #657384; --accent: #0f7a6f; --danger: #b42318; --ok: #16784f;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.45 system-ui, sans-serif; }
    header {
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; background: #fff; border-bottom: 1px solid var(--line);
    }
    h1 { margin: 0; font-size: 17px; }
    .workspace { padding: 12px 12px 16px; min-height: calc(100vh - 56px); }
    .episodes-board, .lanes-board {
      display: flex; flex-wrap: wrap; align-items: flex-start; align-content: flex-start;
      gap: 12px; width: 100%;
    }
    .episode-card {
      position: relative;
      flex: 0 1 200px; width: 200px; max-width: calc(100% - 12px);
      padding: 16px 36px 16px 30px; background: var(--panel); border: 1px solid var(--line);
      border-radius: 10px; border-top: 3px solid var(--accent); cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s, opacity 0.15s;
    }
    .episode-card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(15, 122, 111, 0.12); }
    .episode-card.dragging { opacity: 0.45; }
    .episode-card.drag-over {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(15, 122, 111, 0.25);
    }
    .ep-drag {
      position: absolute; left: 6px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 32px; margin: 0; padding: 0; border: none; border-radius: 4px;
      background: transparent; color: var(--muted); font-size: 16px; line-height: 1;
      cursor: grab; user-select: none;
    }
    .ep-drag:hover { background: #eef2f7; color: var(--accent); }
    .ep-drag:active { cursor: grabbing; }
    .episodes-board-hint {
      flex: 1 1 100%; margin: 0 0 4px; font-size: 12px; color: var(--muted);
    }
    .episode-card h3 { margin: 0 0 6px; font-size: 16px; }
    .episode-card p { margin: 0; color: var(--muted); font-size: 12px; }
    .task-toolbar {
      display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
      padding: 10px 12px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    }
    .task-toolbar h2 { margin: 0; font-size: 16px; flex: 1; }
    .task-toolbar .concat-btn {
      background: #0f766e; border-color: #0f766e; color: #fff;
      width: auto; min-width: 108px; padding: 6px 12px; font-size: 13px;
    }
    .episode-concat-preview {
      margin: 0 0 12px; padding: 10px 12px; background: #f0fdf9;
      border: 1px solid #99f6e4; border-radius: 8px; font-size: 13px;
    }
    .episode-concat-preview a { color: #0f766e; font-weight: 700; }
    .episode-concat-preview a.download-btn {
      display: inline-flex; align-items: center; justify-content: center;
      margin-left: 8px; padding: 4px 10px; border-radius: 6px;
      background: #0f766e; color: #fff; text-decoration: none; font-size: 12px;
    }
    .episode-concat-preview a.download-btn:hover { background: #0b5f59; }
    .episode-concat-preview video {
      display: block; width: 100%; max-width: 280px; margin-top: 8px;
      border-radius: 6px; background: #000;
    }
    .publish-panel {
      margin: 0 0 12px; padding: 12px; background: #f8fafc;
      border: 1px solid #dbeafe; border-radius: 8px;
    }
    .publish-panel h3 { margin: 0 0 8px; font-size: 15px; }
    .publish-grid {
      display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(220px, 1fr));
    }
    .publish-grid .full { grid-column: 1 / -1; }
    .publish-targets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
    .publish-targets label {
      display: inline-flex; align-items: center; gap: 4px; margin: 0;
      padding: 4px 8px; border: 1px solid #d1d5db; border-radius: 6px;
      background: #fff; color: #334155; font-size: 12px; font-weight: 600;
    }
    .publish-targets input { width: auto; height: auto; margin: 0; }
    .publish-actions { display: flex; gap: 8px; margin-top: 8px; }
    .publish-actions button { width: auto; min-width: 120px; margin: 0; }
    .publish-result {
      margin-top: 10px; border: 1px solid #cbd5e1; border-radius: 6px; background: #fff;
      padding: 8px; font-size: 12px; line-height: 1.5;
    }
    .publish-result .warn { color: #b45309; }
    .publish-result .block { color: #b91c1c; }
    .publish-result .pass { color: #166534; }
    button.back-btn {
      width: auto; height: 34px; padding: 0 12px; margin: 0;
      background: #f8fafc; color: var(--accent); border-color: #b8d4cf;
    }
    .lane {
      flex: 0 1 980px; width: 980px; max-width: calc(100% - 12px);
      display: grid;
      grid-template-columns: minmax(260px, 300px) minmax(280px, 1fr) minmax(260px, 320px);
      gap: 10px; align-content: start;
    }
    .image-gen-side { padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 320px; }
    .image-gen-side .image-gen-panel { flex: 1; }
    .lane-head {
      grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: var(--panel); border: 1px solid var(--line);
      border-radius: 8px; border-top: 3px solid var(--accent);
    }
    .lane-head h2 { margin: 0; font-size: 14px; flex: 1; }
    button.btn-del {
      width: auto; height: 28px; margin: 0; padding: 0 10px;
      border: 1px solid #f5c4c0; border-radius: 6px;
      background: #fff1f0; color: var(--danger); font-size: 11px; font-weight: 700;
    }
    button.btn-del:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
    button.btn-del:disabled { opacity: 0.45; cursor: not-allowed; }
    button.ep-del {
      position: absolute; top: 8px; right: 8px;
      width: 24px; height: 24px; margin: 0; padding: 0;
      border: none; border-radius: 50%;
      background: var(--danger); color: #fff; font-size: 14px; line-height: 1;
    }
    button.ep-del:hover { filter: brightness(1.05); }
    button.ep-del:disabled { opacity: 0.35; cursor: not-allowed; }
    button.ep-edit {
      position: absolute; top: 8px; right: 36px;
      width: 24px; height: 24px; margin: 0; padding: 0;
      border: 1px solid var(--line); border-radius: 50%;
      background: #fff; color: var(--accent); font-size: 12px; line-height: 1;
    }
    button.ep-edit:hover { background: #eef8f6; border-color: var(--accent); }
    section { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .side { padding: 12px; }
    label { display: block; margin-bottom: 4px; color: var(--muted); font-size: 11px; font-weight: 700; }
    select, button, input[type="number"] {
      width: 100%; height: 34px; border: 1px solid var(--line); border-radius: 6px;
      background: #fff; font: inherit; margin-bottom: 4px;
    }
    input[type="number"] { padding: 0 8px; }
    textarea {
      width: 100%; min-height: 88px; margin-bottom: 6px; padding: 8px;
      border: 1px solid var(--line); border-radius: 6px; font: inherit; resize: vertical;
    }
    button { font-weight: 700; cursor: pointer; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .preview-side { padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 320px; }
    .video-wrap {
      position: relative; width: 100%; aspect-ratio: 9 / 16; max-height: 460px; margin: 0 auto;
      background: #0f172a; border-radius: 8px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .video-wrap video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    .task-download-btn {
      display: inline-flex; align-items: center; justify-content: center;
      height: 34px; padding: 0 12px; border-radius: 6px;
      background: #0f766e; color: #fff; text-decoration: none;
      font-size: 13px; font-weight: 700;
    }
    .task-download-btn:hover { background: #0b5f59; }
    .task-download-btn[hidden] { display: none !important; }
    .preview-empty { margin: 0; color: #94a3b8; font-size: 13px; text-align: center; padding: 0 12px; }
    .gen-status {
      margin: 0; padding: 12px; border-radius: 8px; text-align: center;
      font-size: 15px; font-weight: 700; background: #f8fafc; color: var(--muted); border: 1px solid var(--line);
    }
    .gen-status.phase-running { color: #9a6700; background: #fff9e6; border-color: #f5e6b8; }
    .gen-status.phase-success { color: var(--ok); background: #edfdf5; border-color: #b7ebd4; }
    .gen-status.phase-skipped { color: var(--danger); background: #fff1f0; border-color: #f5c4c0; }
    .gen-status.phase-failed { color: var(--danger); background: #fff1f0; border-color: #f5c4c0; }
    .run-log-label { margin: 0; font-size: 11px; color: var(--muted); font-weight: 600; }
    .run-log-wrap {
      max-height: 180px;
      overflow-y: auto;
      overflow-x: hidden;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      scroll-behavior: smooth;
    }
    .run-log {
      margin: 0;
      padding: 8px 10px;
      font: 11px/1.45 Consolas, "Courier New", monospace;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .hint { color: var(--muted); font-size: 11px; margin-top: 8px; }
    input[type="file"] { width: 100%; font-size: 11px; margin-bottom: 4px; }
    .ref-preview { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
    .ref-preview img, .ref-preview video {
      width: 56px; height: 56px; object-fit: cover; border-radius: 4px; border: 1px solid var(--line);
    }
    .ref-chip { font-size: 9px; color: var(--muted); }
    .ref-card, .kf-card { position: relative; width: 64px; }
    .ref-card button.del, .kf-card button.del {
      position: absolute; top: 1px; right: 1px; width: 18px; height: 18px; margin: 0; padding: 0;
      border: none; border-radius: 50%; background: var(--danger); color: #fff; font-size: 12px; cursor: pointer;
    }
    .ref-block, .kf-block { margin-bottom: 4px; }
    .paste-target:focus { outline: 2px solid rgba(15, 122, 111, 0.25); border-radius: 8px; }
    .paste-zone-video, .paste-zone-image { transition: box-shadow 0.15s, outline 0.15s; }
    .paste-zone-video.paste-zone-hot {
      box-shadow: inset 0 0 0 2px rgba(15, 122, 111, 0.35);
      outline: 2px dashed rgba(15, 122, 111, 0.45); outline-offset: 2px;
    }
    .paste-zone-image.paste-zone-hot {
      box-shadow: inset 0 0 0 2px rgba(22, 101, 52, 0.35);
      outline: 2px dashed rgba(22, 101, 52, 0.5); outline-offset: 2px;
    }
    button.paste-ref-btn {
      margin-bottom: 8px; background: #f0fdf4; color: #166534; border-color: #86efac;
      font-size: 12px; font-weight: 600; height: 32px;
    }
    button.paste-ref-btn:hover { background: #dcfce7; border-color: #4ade80; }
    button.paste-ref-btn.video { background: #eef8f6; color: #0f766e; border-color: #99f6e4; }
    button.paste-ref-btn.video:hover { background: #d1fae5; border-color: #5eead4; }
    button.add-tile {
      flex: 0 0 56px; width: 56px; height: 56px; margin-top: 4px;
      border: 2px dashed var(--line); border-radius: 12px; background: #fff;
      color: var(--accent); font-size: 28px; line-height: 1; cursor: pointer;
    }
    button.add-tile:hover { border-color: var(--accent); background: #f0faf8; }
    button.prompt-addon {
      margin-bottom: 8px; background: #f8fafc; color: var(--accent); border-color: #b8d4cf;
      font-size: 12px; font-weight: 600; height: 32px;
    }
    button.prompt-addon:hover { background: #eef8f6; border-color: var(--accent); }
    button.deepseek-btn {
      margin-bottom: 8px; background: #eef2ff; color: #3730a3; border-color: #c7d2fe;
      font-size: 12px; font-weight: 700; height: 32px;
    }
    button.deepseek-btn:hover { background: #e0e7ff; border-color: #818cf8; }
    .optimizer-panel {
      margin: 0 0 10px; padding: 10px; border: 1px solid #c7d2fe;
      border-radius: 8px; background: #f8faff;
    }
    .optimizer-panel[hidden] { display: none !important; }
    .optimizer-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .optimizer-toolbar strong { flex: 1; font-size: 12px; color: #3730a3; }
    .optimizer-toolbar button { width: auto; height: 28px; padding: 0 10px; margin: 0; font-size: 11px; }
    .optimizer-panel textarea { min-height: 72px; font-size: 12px; }
    .optimizer-output { min-height: 150px; white-space: pre-wrap; }
    .optimizer-status { margin: 4px 0 8px; font-size: 11px; color: var(--muted); }
    .optimizer-actions { display: flex; gap: 8px; }
    .optimizer-actions button { flex: 1; margin: 0; font-size: 12px; }
    .image-gen-panel {
      padding: 10px; border: 1px solid #bbf7d0; border-radius: 8px;
      background: #f0fdf4;
    }
    .image-gen-panel h3 { margin: 0 0 8px; font-size: 13px; color: #166534; }
    .image-gen-panel textarea { min-height: 70px; font-size: 12px; }
    .image-gen-source, .image-gen-result {
      display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0;
    }
    .image-gen-source img, .image-gen-result img {
      width: 76px; height: 76px; object-fit: cover; border-radius: 6px; border: 1px solid #86efac;
      background: #fff;
    }
    .image-gen-result img { width: 100%; height: auto; max-height: 220px; object-fit: contain; }
    .image-gen-result .gen-result-card { cursor: zoom-in; }
    .image-gen-result .gen-zoomable:hover { filter: brightness(1.03); box-shadow: 0 2px 10px rgba(22, 101, 52, 0.25); }
    .image-lightbox {
      position: fixed; inset: 0; z-index: 1100;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .image-lightbox[hidden] { display: none !important; }
    .image-lightbox-backdrop {
      position: absolute; inset: 0; background: rgba(15, 23, 42, 0.85);
    }
    .image-lightbox-panel {
      position: relative; z-index: 1; max-width: min(96vw, 1280px); max-height: 92vh;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .image-lightbox-close {
      position: absolute; top: -8px; right: -8px; width: 36px; height: 36px; margin: 0; padding: 0;
      border: none; border-radius: 50%; background: #fff; color: #334155;
      font-size: 22px; line-height: 1; cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .image-lightbox-close:hover { background: #f1f5f9; }
    .image-lightbox-caption {
      margin: 0; max-width: 100%; font-size: 12px; color: #e2e8f0; text-align: center;
      word-break: break-all;
    }
    .image-lightbox-panel img {
      max-width: 100%; max-height: calc(92vh - 40px); object-fit: contain;
      border-radius: 8px; background: #fff; box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }
    .image-gen-status { margin: 4px 0 8px; font-size: 11px; color: var(--muted); }
    .image-gen-actions { display: flex; gap: 8px; }
    .image-gen-actions button { flex: 1; margin: 0; font-size: 12px; }
    .save-hint { font-size: 11px; color: var(--muted); }
    .save-hint.saving { color: #9a6700; }
    .save-hint.saved { color: var(--ok); }
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(15, 23, 42, 0.45);
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay[hidden] { display: none !important; }
    .modal-panel {
      width: min(400px, 100%); padding: 18px; background: var(--panel);
      border: 1px solid var(--line); border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }
    .modal-panel h3 { margin: 0 0 14px; font-size: 16px; }
    .ep-no-picker {
      display: grid; grid-template-columns: 88px 1fr; gap: 10px; margin-bottom: 12px;
    }
    .ep-no-wheel-wrap {
      position: relative; height: 132px; border: 1px solid var(--line);
      border-radius: 8px; overflow: hidden; background: #f8fafc;
    }
    .ep-no-wheel-wrap::before,
    .ep-no-wheel-wrap::after {
      content: ''; position: absolute; left: 0; right: 0; height: 44px; z-index: 1;
      pointer-events: none;
    }
    .ep-no-wheel-wrap::before {
      top: 0; background: linear-gradient(#f8fafc, rgba(248, 250, 252, 0));
    }
    .ep-no-wheel-wrap::after {
      bottom: 0; background: linear-gradient(rgba(248, 250, 252, 0), #f8fafc);
    }
    .ep-no-wheel {
      height: 100%; overflow-y: auto; scroll-snap-type: y mandatory;
      padding: 44px 0; scrollbar-width: thin;
    }
    .ep-no-item {
      height: 44px; display: flex; align-items: center; justify-content: center;
      scroll-snap-align: center; font-size: 18px; font-weight: 700; color: var(--muted);
      cursor: pointer; user-select: none;
    }
    .ep-no-item.active { color: var(--accent); font-size: 22px; }
    .ep-no-item.taken { opacity: 0.35; text-decoration: line-through; }
    .ep-no-input-wrap input[type="number"] {
      height: 48px; font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 4px;
    }
    .ep-no-input-wrap input[type="text"] {
      width: 100%; height: 34px; padding: 0 8px; margin-bottom: 0;
      border: 1px solid var(--line); border-radius: 6px; font: inherit;
    }
    .modal-actions {
      display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px;
    }
    .modal-actions button { width: auto; min-width: 72px; margin: 0; }
    .modal-err { color: var(--danger); font-size: 12px; min-height: 18px; margin: 0 0 8px; }
    @media (max-width: 1100px) {
      .lane {
        width: 100%; flex-basis: 100%;
        grid-template-columns: minmax(220px, 280px) minmax(220px, 280px) minmax(240px, 1fr);
      }
    }
    @media (max-width: 520px) { .lane { width: 100%; flex-basis: 100%; grid-template-columns: 1fr; } }
    /* ── Concat Panel ── */
    .concat-btn { background:#0f766e; border-color:#0f766e; color:#fff; width:auto; min-width:auto; padding:6px 12px; font-size:13px; border:1px solid; border-radius:6px; cursor:pointer; }
    .concat-btn:hover { background:#0b5f59; }
    .clip-timeline { margin-top: 8px; border-top: 1px solid #fed7aa; padding-top: 6px; }
    .clip-timeline-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .clip-timeline-header span { font-size: 12px; font-weight: 600; color: #9a3412; }
    .clip-timeline-track { display: flex; gap: 4px; overflow-x: auto; padding: 4px 0 8px; min-height: 64px; align-items: stretch; }
    .clip-timeline-card { flex: 0 0 100px; min-width: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 6px 4px; background: #fff; border: 2px solid #fed7aa; border-radius: 6px; cursor: grab; user-select: none; position: relative; transition: transform 0.15s, box-shadow 0.15s; }
    .clip-timeline-card:hover { box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .clip-timeline-card.dragging { opacity: 0.3; transform: scale(0.95); }
    .clip-timeline-card.drag-over { border-color: #f97316; background: #fff7ed; transform: translateY(-4px); }
    .clip-timeline-card .drag-handle { position: absolute; top: 2px; left: 4px; font-size: 10px; color: #d97706; }
    .clip-timeline-card .card-label { font-size: 10px; font-weight: 600; color: #9a3412; text-align: center; line-height: 1.2; }
    .clip-timeline-card .card-thumb { width: 64px; height: 36px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; }
    .clip-timeline-card .card-duration { font-size: 9px; color: #999; }
  </style>
</head>
<body>
  <header>
    <h1>AI Video Batch Console <span style="font-size:12px;font-weight:400;color:#888;margin-left:8px">v{{SEEDANCE_VERSION}}</span></h1>
    <span class="save-hint" id="saveHint">已同步到本地</span>
    <span class="save-hint" id="serverVer" style="margin-left:8px;color:#64748b;"></span>
  </header>
  <div class="workspace">
    <div id="episodeView">
      <div class="episodes-board" id="episodesBoard">
        <p class="episodes-board-hint">拖动卡片左侧 ⠿ 可调整集数顺序，松手后自动保存</p>
        <button type="button" class="add-tile" id="addEpisodeBtn" title="添加集数">+</button>
      </div>
    </div>
    <div id="taskView" hidden>
      <div class="task-toolbar">
        <button type="button" class="back-btn" id="backToEpisodes">← 返回集数</button>
        <h2 id="activeEpisodeTitle">第 1 集</h2>
        <button type="button" class="back-btn" id="editActiveEpisode">修改集数</button>
      </div>
      <div id="concatBar" style="margin:8px 0;padding:12px 16px;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;" hidden>
        <h3 style="margin:0 0 8px;font-size:14px;color:#9a3412;">📽️ 分镜拼接</h3>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <button type="button" id="concatPreviewBtn" class="concat-btn" style="font-size:11px;padding:2px 8px;">生成顺序预览</button>
          <button type="button" id="concatRenderBtn" class="concat-btn">一键拼接本集</button>

      <option value="9:16">9:16（竖屏）</option>

  </template>
  <script>
    const DEFAULT_DURATION = 4;
    const DEFAULT_ASSET = 'GUI_QUICK';
    const PROMPT_REF_STRICT_SUFFIX = '人物形象和场景严格参考参考素材，杜绝美化和修改';

    let configData = { defaults: { duration: DEFAULT_DURATION }, assets: {} };
    let workspace = { episodes: [], active_episode_id: null, episode_seq: 0 };
    let activeEpisodeId = null;
    let activeLaneCtrls = [];
    const pasteLaneHandlers = [];
    let globalMouseX = 0;
    let globalMouseY = 0;
    let saveTimer = null;
    let savePending = false;
    let serverApiVersion = 0;
    let serverFeatures = [];
    let imageGenerationConfig = {
      providers: {
        gemini: {
          label: 'Gemini',
          base_url: 'https://generativelanguage.googleapis.com/v1beta',
          default_model: 'gemini-3-pro-image-preview',
          models: ['gemini-3-pro-image-preview', 'gemini-3.1-flash-image-preview', 'gemini-2.5-flash-image'],
          has_api_key: false,
        },
        volc: {
          label: '火山方舟',
          base_url: 'https://ark.cn-beijing.volces.com/api/v3',
          default_model: 'doubao-seedream-5-0-260128',
          models: ['doubao-seedream-5-0-260128', 'doubao-seedream-4-5-251128', 'doubao-seedream-4-0-250828'],
          has_api_key: false,
        },
      },
      provider: 'gemini',
    };
    let promptOptimizerConfig = {
      provider: 'deepseek',
      base_url: 'https://api.deepseek.com',
      model: 'deepseek-chat',
      providers: {
        deepseek: {
          label: 'DeepSeek',
          base_url: 'https://api.deepseek.com',
          default_model: 'deepseek-chat',
          models: ['deepseek-chat', 'deepseek-reasoner'],
          has_api_key: false,
        },
        gemini: {
          label: 'Gemini',
          base_url: 'https://generativelanguage.googleapis.com/v1beta',
          default_model: 'gemini-3-pro-preview',
          models: ['gemini-3-pro-preview', 'gemini-3-flash-preview', 'gemini-3.1-pro-preview', 'gemini-3.5-flash'],
          has_api_key: false,
        },
      },
    };
    const PUBLISH_PLATFORMS = [
      { id: 'douyin', label: '抖音' },
      { id: 'youtube', label: 'YouTube' },
      { id: 'tiktok', label: 'TikTok' },
      { id: 'x', label: 'X(推特)' },
      { id: 'custom', label: '其他' },
    ];
    const PUBLISH_LANGUAGES = [
      { id: 'zh-CN', label: '中文简体' },
      { id: 'zh-TW', label: '中文繁体' },
      { id: 'en', label: '英文' },
      { id: 'ja', label: '日文' },
    ];

    const RESTART_HINT = '请关闭旧的黑窗口，双击项目根目录 start_seedance_gui.bat 重新启动后再试。';

    function serverSupportsConcat() {
      return serverFeatures.includes('episode_concat') || serverApiVersion >= 9;
    }

    function serverSupportsPromptOptimizer() {
      return serverFeatures.includes('prompt_optimizer') || serverApiVersion >= 10;
    }

    function serverSupportsImageGeneration() {
      return serverFeatures.includes('image_generation') || serverApiVersion >= 11;
    }

    function serverSupportsPublishProfile() {
      return serverFeatures.includes('publish_profile') || serverApiVersion >= 12;
    }

    function serverSupportsEpisodeAudit() {
      return serverFeatures.includes('episode_content_audit') || serverApiVersion >= 13;
    }

    function defaultPublishProfile() {
      return {
        targets: [],
        default_language: 'zh-CN',
        content: {
          title: '',
          description: '',
          hashtags: [],
        },
        platform_overrides: {},
        last_validation_result: { platforms: {}, summary: { pass: 0, warn: 0, block: 0 } },
        updated_at: '',
      };
    }

    function normalizePublishProfile(input) {
      const base = defaultPublishProfile();
      const profile = input && typeof input === 'object' ? { ...base, ...input } : { ...base };
      const content = profile.content && typeof profile.content === 'object' ? profile.content : {};
      profile.content = {
        title: String(content.title || '').trim(),
        description: String(content.description || '').trim(),
        hashtags: Array.isArray(content.hashtags)
          ? content.hashtags.map(x => String(x || '').trim()).filter(Boolean)
          : String(content.hashtags || '').split(',').map(x => x.trim()).filter(Boolean),
      };
      if (!PUBLISH_LANGUAGES.some(x => x.id === profile.default_language)) {
        profile.default_language = 'zh-CN';
      }
      profile.targets = Array.isArray(profile.targets)
        ? profile.targets.map(x => String(x || '').trim().toLowerCase()).filter(x => PUBLISH_PLATFORMS.some(p => p.id === x))
        : [];
      if (!profile.platform_overrides || typeof profile.platform_overrides !== 'object') {
        profile.platform_overrides = {};
      }
      if (!profile.last_validation_result || typeof profile.last_validation_result !== 'object') {
        profile.last_validation_result = base.last_validation_result;
      }
      return profile;
    }

    function ensureEpisodePublishProfile(episode) {
      if (!episode) return defaultPublishProfile();
      episode.publish_profile = normalizePublishProfile(episode.publish_profile);
      return episode.publish_profile;
    }

    async function parseApiJson(res) {
      const text = await res.text();
      if (!text.trim()) {
        return { ok: false, error: `HTTP ${res.status}（空响应）` };
      }
      const trimmed = text.trim();
      if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
        try {
          return JSON.parse(trimmed);
        } catch (e) {
          return { ok: false, error: '响应不是有效 JSON' };
        }
      }
      if (trimmed.startsWith('<!DOCTYPE') || trimmed.startsWith('<html')) {
        if (res.status === 404) {
          return {
            ok: false,
            error: `接口不存在 (HTTP 404)。当前 GUI 服务过旧，${RESTART_HINT}`,
          };
        }
        return {
          ok: false,
          error: `服务器返回了网页而非 JSON (HTTP ${res.status})。${RESTART_HINT}`,
        };
      }
      return { ok: false, error: trimmed.slice(0, 240) || `HTTP ${res.status}` };
    }

    function extractOptimizedPrompt(text) {
      let value = String(text || '').trim();
      const markers = ['【优化提示词】', '优化提示词：', '优化后的提示词：', '最终提示词：'];
      for (const marker of markers) {
        const idx = value.indexOf(marker);
        if (idx >= 0) {
          value = value.slice(idx + marker.length).trim();
          break;
        }
      }
      value = value.replace(/^```(?:text|txt|markdown)?\s*/i, '').replace(/```$/i, '').trim();
      return value || String(text || '').trim();
    }
    let draggedEpisodeId = null;

    function field(root, name) {
      return root.querySelector(`[data-field="${name}"]`);
    }

    function shotTaskLabel(index) {
      return `分镜任务${index}`;
    }

    function taskOutputSlug(episode, taskIndex) {
      const epNo = parseEpisodeNo(episode);
      return `ep-${epNo}-task-${taskIndex}`;
    }

    function mediaUrl(path) {
      return `/api/media?path=${encodeURIComponent(path)}`;
    }

    function findEpisode(episodeId) {
      return workspace.episodes.find(ep => ep.id === episodeId) || null;
    }

    function parseEpisodeNo(ep) {
      if (ep.episode_no != null) return Number(ep.episode_no);
      const m = String(ep.title || '').match(/第\s*(\d+)\s*集/);
      if (m) return parseInt(m[1], 10);
      const idm = String(ep.id || '').match(/^ep-(\d+)$/);
      return idm ? parseInt(idm[1], 10) : 1;
    }

    function suggestNextEpisodeNo() {
      const used = new Set(workspace.episodes.map(ep => parseEpisodeNo(ep)));
      let n = 1;
      while (used.has(n)) n += 1;
      return n;
    }

    function nextInternalEpisodeId() {
      let max = 0;
      workspace.episodes.forEach(ep => {
        const m = String(ep.id || '').match(/^ep-(\d+)$/);
        if (m) max = Math.max(max, parseInt(m[1], 10));
      });
      return `ep-${max + 1}`;
    }

    function episodeNoTaken(episodeNo, excludeId) {
      return workspace.episodes.some(
        ep => parseEpisodeNo(ep) === episodeNo && ep.id !== excludeId
      );
    }

    const episodeModal = {
      el: null,
      wheel: null,
      input: null,
      titleInput: null,
      err: null,
      excludeId: null,
      titleManual: false,
      resolver: null,
      scrollTimer: null,
    };

    function initImageLightbox() {
      const lb = document.getElementById('imageLightbox');
      const imgEl = document.getElementById('imageLightboxImg');
      const captionEl = document.getElementById('imageLightboxCaption');
      if (!lb || !imgEl) return;

      function closeImageLightbox() {
        lb.hidden = true;
        imgEl.removeAttribute('src');
        document.body.style.overflow = '';
      }

      window.openImageLightbox = (url, title) => {
        if (!url) return;
        imgEl.src = url;
        imgEl.alt = title || '生成图片';
        captionEl.textContent = title || '';
        lb.hidden = false;
        document.body.style.overflow = 'hidden';
      };

      lb.querySelectorAll('[data-action="closeLightbox"]').forEach((el) => {
        el.addEventListener('click', closeImageLightbox);
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !lb.hidden) closeImageLightbox();
      });
    }

    function initEpisodeModal() {
      episodeModal.el = document.getElementById('episodeModal');
      episodeModal.wheel = document.getElementById('epNoWheel');
      episodeModal.input = document.getElementById('epNoInput');
      episodeModal.titleInput = document.getElementById('epTitleInput');
      episodeModal.err = document.getElementById('episodeModalErr');

      episodeModal.wheel.addEventListener('scroll', () => {
        clearTimeout(episodeModal.scrollTimer);
        episodeModal.scrollTimer = setTimeout(syncEpisodeNoFromWheel, 80);
      });

      episodeModal.input.addEventListener('input', () => {
        const n = clampEpisodeNo(episodeModal.input.value);
        episodeModal.input.value = String(n);
        scrollWheelToNo(n);
        maybeAutoTitle(n);
      });

      episodeModal.titleInput.addEventListener('input', () => {
        episodeModal.titleManual = true;
      });

      document.getElementById('epModalCancel').addEventListener('click', () => closeEpisodeModal(null));
      document.getElementById('epModalConfirm').addEventListener('click', confirmEpisodeModal);
      episodeModal.el.addEventListener('click', (e) => {
        if (e.target === episodeModal.el) closeEpisodeModal(null);
      });
    }

    function clampEpisodeNo(value) {
      const n = parseInt(String(value), 10);
      if (!Number.isFinite(n) || n < 1) return 1;
      if (n > 999) return 999;
      return n;
    }

    function wheelMaxNo() {
      const used = workspace.episodes.map(ep => parseEpisodeNo(ep));
      const base = suggestNextEpisodeNo();
      return Math.max(99, base + 30, ...used, 1) + 10;
    }

    function buildEpisodeWheel(excludeId) {
      const maxNo = wheelMaxNo();
      const html = [];
      for (let n = 1; n <= maxNo; n += 1) {
        const taken = episodeNoTaken(n, excludeId);
        html.push(
          `<div class="ep-no-item${taken ? ' taken' : ''}" data-no="${n}">${n}</div>`
        );
      }
      episodeModal.wheel.innerHTML = html.join('');
      episodeModal.wheel.querySelectorAll('.ep-no-item').forEach(item => {
        item.addEventListener('click', () => {
          const n = clampEpisodeNo(item.dataset.no);
          episodeModal.input.value = String(n);
          scrollWheelToNo(n);
          maybeAutoTitle(n);
        });
      });
    }

    function scrollWheelToNo(no) {
      const item = episodeModal.wheel.querySelector(`.ep-no-item[data-no="${no}"]`);
      if (!item) return;
      const top = item.offsetTop - (episodeModal.wheel.clientHeight - item.clientHeight) / 2;
      episodeModal.wheel.scrollTop = top;
      highlightWheelItem(no);
    }

    function highlightWheelItem(no) {
      episodeModal.wheel.querySelectorAll('.ep-no-item').forEach(el => {
        el.classList.toggle('active', Number(el.dataset.no) === no);
      });
    }

    function syncEpisodeNoFromWheel() {
      const wrap = episodeModal.wheel;
      const center = wrap.scrollTop + wrap.clientHeight / 2;
      let best = null;
      let bestDist = Infinity;
      wrap.querySelectorAll('.ep-no-item').forEach(item => {
        const itemCenter = item.offsetTop + item.clientHeight / 2;
        const dist = Math.abs(itemCenter - center);
        if (dist < bestDist) {
          bestDist = dist;
          best = item;
        }
      });
      if (!best) return;
      const n = clampEpisodeNo(best.dataset.no);
      episodeModal.input.value = String(n);
      highlightWheelItem(n);
      maybeAutoTitle(n);
    }

    function maybeAutoTitle(no) {
      if (episodeModal.titleManual) return;
      episodeModal.titleInput.value = `第 ${no} 集`;
    }

    function showEpisodeModal({ existing, excludeId }) {
      return new Promise((resolve) => {
        episodeModal.resolver = resolve;
        episodeModal.excludeId = excludeId || (existing ? existing.id : null);
        episodeModal.titleManual = !!(existing && existing.title
          && existing.title !== `第 ${parseEpisodeNo(existing)} 集`);
        episodeModal.err.textContent = '';
        document.getElementById('episodeModalTitle').textContent =
          existing ? '修改集数' : '新建集数';

        const defaultNo = existing ? parseEpisodeNo(existing) : suggestNextEpisodeNo();
        buildEpisodeWheel(episodeModal.excludeId);
        episodeModal.input.value = String(defaultNo);
        episodeModal.titleInput.value = existing
          ? (existing.title || `第 ${defaultNo} 集`)
          : `第 ${defaultNo} 集`;
        episodeModal.el.hidden = false;
        requestAnimationFrame(() => scrollWheelToNo(defaultNo));
        episodeModal.input.focus();
        episodeModal.input.select();
      });
    }

    function closeEpisodeModal(result) {
      episodeModal.el.hidden = true;
      if (episodeModal.resolver) episodeModal.resolver(result);
      episodeModal.resolver = null;
    }

    function confirmEpisodeModal() {
      const episode_no = clampEpisodeNo(episodeModal.input.value);
      const title = episodeModal.titleInput.value.trim() || `第 ${episode_no} 集`;
      if (episodeNoTaken(episode_no, episodeModal.excludeId)) {
        episodeModal.err.textContent = `第 ${episode_no} 集已存在，请换编号`;
        return;
      }
      closeEpisodeModal({ episode_no, title });
    }

    function updateActiveEpisodeTitle() {

    function scheduleSave() {

    async function saveWorkspace() {
      syncActiveTasksToWorkspace();
      const payload = {
        workspace: {
          version: 1,
          episode_seq: workspace.episode_seq,
          active_episode_id: activeEpisodeId,
          episodes: workspace.episodes,
        },
      };
      savePending = true;
      try {
        const res = await fetch('/api/workspace', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        let data = {};
        try { data = await res.json(); } catch { data = {}; }
        if (res.status === 404) {
          setSaveHint('请重启 GUI 服务', 'saving');
          return false;
        }
        if (!res.ok || !data.ok) throw new Error(data.error || '保存失败');
        workspace = data.workspace;
        setSaveHint('已保存到本地', 'saved');
        return true;
      } catch (err) {
        setSaveHint('保存失败', '');
        console.error(err);
        return false;
      } finally {
        savePending = false;
      }
    }

    async function checkServerApi() {
      try {
        const res = await fetch('/api/ping');
        const data = await res.json();
        if (res.ok && data.ok && data.api_version >= 9) {
          serverApiVersion = data.api_version;
          serverFeatures = data.features || [];
          promptOptimizerConfig = data.prompt_optimizer || promptOptimizerConfig;
          imageGenerationConfig = data.image_generation || imageGenerationConfig;
          if (window._imageGenRefreshFns) window._imageGenRefreshFns.forEach(function(fn) { fn(); });
          return true;
        }
        if (res.ok && data.ok && data.api_version >= 3) {
          serverApiVersion = data.api_version;
          serverFeatures = data.features || [];
          promptOptimizerConfig = data.prompt_optimizer || promptOptimizerConfig;
          imageGenerationConfig = data.image_generation || imageGenerationConfig;
          setSaveHint(`服务版本偏旧(v${data.api_version})，请重启 start_seedance_gui.bat`, 'saving');
          return true;
        }
        if (res.ok && data.ok && data.api_version >= 2) {
          serverApiVersion = data.api_version;
          serverFeatures = data.features || [];
          promptOptimizerConfig = data.prompt_optimizer || promptOptimizerConfig;
          imageGenerationConfig = data.image_generation || imageGenerationConfig;
          setSaveHint('服务版本过旧，请重启 start_seedance_gui.bat', 'saving');
          return true;
        }
      } catch (err) {
        console.error(err);
      }
      serverApiVersion = 0;
      setSaveHint('服务需重启', 'saving');
      return false;
    }

    function reorderEpisodes(dragId, targetId) {
      const list = workspace.episodes;
      const fromIdx = list.findIndex(ep => ep.id === dragId);
      const toIdx = list.findIndex(ep => ep.id === targetId);
      if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return;
      const [item] = list.splice(fromIdx, 1);
      list.splice(toIdx, 0, item);
    }

    function initEpisodeDragDrop() {
      const board = document.getElementById('episodesBoard');
      if (board.dataset.dndInit === '1') return;
      board.dataset.dndInit = '1';

      board.addEventListener('dragstart', (e) => {
        const handle = e.target.closest('.ep-drag');
        if (!handle) return;
        const card = handle.closest('.episode-card');
        if (!card) return;
        draggedEpisodeId = card.dataset.episode;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', draggedEpisodeId);
        if (e.dataTransfer.setDragImage) {
          e.dataTransfer.setDragImage(card, card.offsetWidth / 2, card.offsetHeight / 2);
        }
      });

      board.addEventListener('dragend', () => {
        board.querySelectorAll('.episode-card.dragging').forEach(el => el.classList.remove('dragging'));
        board.querySelectorAll('.episode-card.drag-over').forEach(el => el.classList.remove('drag-over'));
        draggedEpisodeId = null;
      });

      board.addEventListener('dragover', (e) => {
        if (!draggedEpisodeId) return;
        const card = e.target.closest('.episode-card');
        if (!card) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        board.querySelectorAll('.episode-card.drag-over').forEach(el => el.classList.remove('drag-over'));
        if (card.dataset.episode !== draggedEpisodeId) {
          card.classList.add('drag-over');
        }
      });

      board.addEventListener('dragleave', (e) => {
        const card = e.target.closest('.episode-card');
        if (card) card.classList.remove('drag-over');
      });

      board.addEventListener('drop', (e) => {
        if (!draggedEpisodeId) return;
        const targetCard = e.target.closest('.episode-card');
        if (!targetCard) return;
        e.preventDefault();
        const targetId = targetCard.dataset.episode;
        if (!targetId || targetId === draggedEpisodeId) return;
        reorderEpisodes(draggedEpisodeId, targetId);
        renderEpisodeBoard();
        scheduleSave();
      });
    }

    function renderEpisodeBoard() {
      const board = document.getElementById('episodesBoard');
      const addBtn = document.getElementById('addEpisodeBtn');
      board.querySelectorAll('.episode-card').forEach(el => el.remove());
      const canDeleteEpisode = workspace.episodes.length > 1;
      workspace.episodes.forEach(ep => {
        const card = document.createElement('div');
        card.className = 'episode-card';
        card.dataset.episode = ep.id;
        const count = (ep.tasks || []).length;
        const epNo = parseEpisodeNo(ep);
        const dragBtn = document.createElement('button');
        dragBtn.type = 'button';
        dragBtn.className = 'ep-drag';
        dragBtn.draggable = true;
        dragBtn.title = '拖动调整顺序';
        dragBtn.textContent = '⠿';
        dragBtn.addEventListener('click', (e) => e.stopPropagation());
        dragBtn.addEventListener('mousedown', (e) => e.stopPropagation());
        const editBtn = document.createElement('button');
        editBtn.type = 'button';
        editBtn.className = 'ep-edit';
        editBtn.title = '修改集数';
        editBtn.textContent = '✎';
        editBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          editEpisode(ep.id);
        });

        delBtn.type = 'button';
        delBtn.className = 'ep-del';
        delBtn.title = canDeleteEpisode ? '删除集数' : '至少保留一个集数';
        delBtn.textContent = '×';
        delBtn.disabled = !canDeleteEpisode;
        delBtn.addEventListener('click', (e) => {

          deleteEpisode(ep.id);
        });
        card.innerHTML = `<h3>${ep.title || `第 ${epNo} 集`}</h3><p>第 ${epNo} 集 · ${count} 个分镜任务 · 点击进入</p>`;
        card.appendChild(dragBtn);

        card.addEventListener('click', () => enterEpisode(ep.id));

    async function editEpisode(episodeId) {
      const ep = findEpisode(episodeId);
      if (!ep) return;
      const fields = await showEpisodeModal({ existing: ep, excludeId: episodeId });
      if (!fields) return;
      try {
        const res = await fetch('/api/episodes/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            episode_id: episodeId,
            episode_no: fields.episode_no,
            title: fields.title,
          }),
        });
        let data = {};
        try { data = await res.json(); } catch { data = {}; }
        if (res.status === 404) {
          updateEpisodeLocal(episodeId, fields.episode_no, fields.title);
          if (await saveWorkspace()) {
            renderEpisodeBoard();
            if (activeEpisodeId === episodeId) updateActiveEpisodeTitle();
            return;
          }
          alert('修改接口不可用。' + RESTART_HINT);
          return;
        }
        if (!res.ok || !data.ok) {
          alert(data.error || `修改失败 (${res.status})`);
          return;
        }
        if (data.workspace) workspace = data.workspace;
        renderEpisodeBoard();
        if (activeEpisodeId === episodeId) refreshAllOutputLabels();
        if (activeEpisodeId === episodeId) updateActiveEpisodeTitle();
        setSaveHint('已保存到本地', 'saved');
      } catch (err) {
        alert('修改集数失败：' + err.message);
      }
    }

    async function deleteEpisode(episodeId) {
      if (workspace.episodes.length <= 1) {
        alert('至少保留一个集数');
        return;
      }
      const ep = findEpisode(episodeId);
      if (!ep) return;
      if (!confirm(`确定删除「${ep.title || episodeId}」及其全部 ${(ep.tasks || []).length} 个分镜任务？`)) return;
      if (activeEpisodeId === episodeId) {
        syncActiveTasksToWorkspace();
        activeEpisodeId = null;
        workspace.active_episode_id = null;
        clearTaskBoard();
        showEpisodeView();
      }
      try {
        const res = await fetch('/api/episodes/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ episode_id: episodeId }),
        });
        let data = {};
        try { data = await res.json(); } catch { data = {}; }
        if (res.status === 404) {
          deleteEpisodeLocal(episodeId);
          if (await saveWorkspace()) {
            renderEpisodeBoard();
            return;
          }
          alert('删除接口不可用。' + RESTART_HINT);
          return;
        }
        if (!res.ok || !data.ok) {
          alert(data.error || `删除失败 (${res.status})`);
          return;
        }
        workspace = data.workspace;
        renderEpisodeBoard();
        setSaveHint('已保存到本地', 'saved');
      } catch (err) {
        alert('删除集数失败：' + err.message);
      }
    }

    function renderConcatTimeline(episode) {
      const wrap = document.getElementById('concatTimeline');
      const track = document.getElementById('concatTimelineTrack');
      if (!wrap || !track) return;
      const tasks = episode?.tasks || [];
      if (tasks.length < 2) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block';
      const saved = episode?.clip_segment_order;
      let indices;
      if (Array.isArray(saved) && saved.length === tasks.length && saved.every(i => i >= 0 && i < tasks.length)) {
        indices = [...saved];
      } else {
        indices = tasks.map((_, i) => i);
      }
      const colors = ['#f97316','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#6366f1'];
      track.innerHTML = indices.map((idx, pos) => `
        <div class="clip-timeline-card" draggable="true" data-idx="${idx}" data-pos="${pos}">
          <span class="drag-handle">⠿</span>
          <div class="card-thumb" style="background:${colors[idx % colors.length]}">${idx + 1}</div>
          <div class="card-label">${shotTaskLabel(idx)}</div>
        </div>
      `).join('');

      let dragEl = null;
      track.addEventListener('dragover', (e) => e.preventDefault());
      track.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!dragEl) return;
        track.appendChild(dragEl);
        persistSegmentOrderFromTrack();
      });
      track.querySelectorAll('.clip-timeline-card').forEach(card => {
        card.addEventListener('dragstart', (e) => {
          dragEl = card;
          card.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
          track.querySelectorAll('.clip-timeline-card').forEach(c => c.classList.remove('drag-over'));
          if (dragEl) { persistSegmentOrderFromTrack(); dragEl = null; }
        });
        card.addEventListener('dragover', (e) => { e.preventDefault(); card.classList.add('drag-over'); });
        card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
        card.addEventListener('drop', (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (!dragEl || dragEl === card) return;
          const after = card.nextSibling;
          track.insertBefore(dragEl, after);
          persistSegmentOrderFromTrack();
        });
      });
    }

    function persistSegmentOrderFromTrack() {
      const track = document.getElementById('concatTimelineTrack');
      if (!track) return;
      const ep = findEpisode(activeEpisodeId);
      if (!ep) return;
      ep.clip_segment_order = Array.from(track.querySelectorAll('.clip-timeline-card')).map(el => parseInt(el.dataset.idx, 10));

          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ episode_id: activeEpisodeId, video_path: videoPath }),

        const data = await res.json();

          renderAuditResult(data.result);
          episode.last_content_audit_result = data.result;

      } finally {

      }

    function renderAuditResult(result) {
      const bar = document.getElementById('auditBar');
      if (!bar) return;
      const items = Array.isArray(result.risk_items) ? result.risk_items : [];
      const level = result.risk_level || 'medium';
      const score = result.score_retention ? `${result.score_retention}/10` : '—';
      const scoreComment = result.score_comment ? `（${result.score_comment}）` : '';
      const levelColor = level === 'high' ? '#dc2626' : level === 'medium' ? '#d97706' : '#16a34a';
      const density = result.information_density_diagnosis ? `<div style="margin:4px 0 0;"><strong>信息密度：</strong>${result.information_density_diagnosis}</div>` : '';
      const conversion = result.game_conversion_diagnosis ? `<div style="margin:2px 0;"><strong>宣发转化：</strong>${result.game_conversion_diagnosis}</div>` : '';
      const plans = Array.isArray(result.optimization_plans) ? result.optimization_plans : [];
      const plansHtml = plans.length ? `<div style="margin:4px 0 0;"><strong>优化方案</strong><ul style="margin:2px 0 0 16px;padding:0;">${plans.map(p => `<li style="margin:2px 0;">${p}</li>`).join('')}</ul></div>` : '';
      const listHtml = items.length ? `<ul style="margin:4px 0 0 16px;padding:0;">${items.map(item => `<li style="margin:2px 0;"><strong>${item.category || '风险点'}</strong>（${item.severity || 'medium'}）：${item.evidence || '无'}；建议：${item.suggestion || '按平台规范调整'}</li>`).join('')}</ul>` : '';
      const notes = result.platform_notes && typeof result.platform_notes === 'object' ? Object.entries(result.platform_notes).filter(([, v]) => String(v || '').trim()).map(([k, v]) => `<li style="margin:2px 0;"><strong>${k}</strong>：${v}</li>`).join('') : '';
      const notesHtml = notes ? `<div style="margin:4px 0 0;"><strong>平台建议</strong><ul style="margin:2px 0 0 16px;padding:0;">${notes}</ul></div>` : '';
      const riskEmoji = level === 'high' ? '🔴' : level === 'medium' ? '🟡' : '🟢';
      bar.innerHTML = `
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
          <span style="font-weight:700;font-size:13px;">AI 审核反馈</span>
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;">
          <span><strong>评分</strong> ${score}${scoreComment}</span>
          <span><strong>风险</strong> <span style="color:${levelColor};font-weight:600;">${riskEmoji} ${level}</span></span>
          <span><strong>结论</strong> ${result.summary || ''}</span>
        </div>
        ${density}
        ${conversion}
        ${plansHtml}
        ${listHtml ? `<div style="margin-top:4px;"><strong>风险明细</strong>${listHtml}</div>` : ''}
        ${notesHtml}
      `;
      bar.style.display = 'block';
    }

      wrap.innerHTML = PUBLISH_PLATFORMS.map(item => `

      `).join('');

    function renderPublishLanguageOptions(selected) {
      const select = document.getElementById('publishLanguage');
      if (!select) return;
      select.innerHTML = PUBLISH_LANGUAGES.map(item => (

    function getPublishProfileFromForm() {
      const targets = Array.from(document.querySelectorAll('[data-publish-target]:checked'))
        .map(el => el.getAttribute('data-publish-target'))
        .filter(Boolean);
      return normalizePublishProfile({
        targets,
        default_language: document.getElementById('publishLanguage')?.value || 'zh-CN',
        content: {
          title: document.getElementById('publishTitle')?.value || '',
          description: document.getElementById('publishDescription')?.value || '',
          hashtags: (document.getElementById('publishHashtags')?.value || '')
            .replace(/，/g, ',')
            .split(',')
            .map(x => x.trim())
            .filter(Boolean),
        },
      });
    }

    function renderPublishResult(result) {
      const box = document.getElementById('publishResult');
      if (!box) return;
      if (!result || !result.platforms) {
        box.textContent = '配置后可点击“开始审核”。';
        return;
      }
      const summary = result.summary || {};
      const rows = Object.entries(result.platforms).map(([platform, data]) => {
        const issues = data.issues || [];
        const items = issues.map(item => (
          `<li class="${item.level || ''}">[${item.level}] ${item.message}；建议：${item.suggestion}</li>`
        )).join('');
        return `<div><strong>${platform}</strong><ul>${items}</ul></div>`;
      }).join('');
      box.innerHTML = `
        <div>审核汇总：<span class="pass">通过 ${summary.pass || 0}</span> /
        <span class="warn">警告 ${summary.warn || 0}</span> /
        <span class="block">阻断 ${summary.block || 0}</span></div>
        ${rows}
      `;
    }

    function mountPublishPanel(episode) {
      const panel = document.getElementById('publishPanel');
      if (!panel) return;
      const profile = ensureEpisodePublishProfile(episode);
      renderPublishTargets(profile.targets);
      renderPublishLanguageOptions(profile.default_language);
      document.getElementById('publishTitle').value = profile.content.title || '';
      document.getElementById('publishDescription').value = profile.content.description || '';
      document.getElementById('publishHashtags').value = (profile.content.hashtags || []).join(', ');
      renderPublishResult(profile.last_validation_result);
      panel.hidden = false;
      panel.style.opacity = serverSupportsPublishProfile() ? '1' : '0.7';
    }

    function hidePublishPanel() {
      const panel = document.getElementById('publishPanel');
      if (panel) panel.hidden = true;
    }

    function savePublishProfileLocal() {
      if (!activeEpisodeId) return null;
      const episode = findEpisode(activeEpisodeId);
      if (!episode) return null;
      const profile = getPublishProfileFromForm();
      profile.updated_at = new Date().toISOString();
      episode.publish_profile = profile;
      scheduleSave();
      return profile;
    }

    async function savePublishProfileRemote() {
      if (!activeEpisodeId) return;
      const episode = findEpisode(activeEpisodeId);
      if (!episode) return;
      const profile = savePublishProfileLocal();
      if (!profile) return;
      if (!serverSupportsPublishProfile()) {
        setSaveHint(`服务版本 v${serverApiVersion || '?'} 不支持平台发布接口，已本地保存`, 'saving');
        return;
      }
      const res = await fetch('/api/publish_profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ episode_id: activeEpisodeId, publish_profile: profile }),
      });
      const data = await parseApiJson(res);
      if (!res.ok || !data.ok) throw new Error(data.error || '保存平台配置失败');
      episode.publish_profile = normalizePublishProfile(data.publish_profile || profile);
      setSaveHint('平台发布配置已保存', 'saved');
    }

    async function runPublishPrecheck() {
      if (!activeEpisodeId) return;
      const episode = findEpisode(activeEpisodeId);
      if (!episode) return;
      const profile = savePublishProfileLocal();
      if (!profile) return;
      let result = null;
      if (serverSupportsPublishProfile()) {
        const res = await fetch('/api/publish_precheck', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ episode_id: activeEpisodeId, publish_profile: profile }),
        });
        const data = await parseApiJson(res);
        if (!res.ok || !data.ok) throw new Error(data.error || '预检失败');
        result = data.result;
      } else {
        throw new Error(`当前服务不支持平台审核（v${serverApiVersion || '?'}），请重启 GUI`);
      }
      episode.publish_profile.last_validation_result = result;
      renderPublishResult(result);
      scheduleSave();
    }

    async function exportPublishPackage() {
      if (!activeEpisodeId) return;
      const profile = savePublishProfileLocal();
      if (!profile) return;
      if (!serverSupportsPublishProfile()) {
        throw new Error(`当前服务不支持平台导出（v${serverApiVersion || '?'}），请重启 GUI`);
      }
      const res = await fetch('/api/publish_export', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ episode_id: activeEpisodeId, publish_profile: profile }),
      });
      const data = await parseApiJson(res);
      if (!res.ok || !data.ok) throw new Error(data.error || '导出失败');
      const filename = data.filename || `publish-package-${activeEpisodeId}.json`;
      const text = JSON.stringify(data.export || {}, null, 2);
      const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      renderPublishResult(data.result || null);
    }

        const videos = state.uploadedReferences.filter(i => i.kind === 'video').length;
        return { images, videos };

        ui.optimizerStatus.textContent = text;

      }

      function optimizerProviderInfo(provider) {
        const providers = promptOptimizerConfig.providers || {};
        return providers[provider] || providers.deepseek || {};
      }

      function populateOptimizerProviders() {
        const providers = promptOptimizerConfig.providers || {};
        const ids = Object.keys(providers);
        ui.optimizerProvider.innerHTML = ids.map(id => {
          const info = providers[id] || {};
          const keyState = info.has_api_key ? '' : '（未配置Key）';
          return `<option value="${id}">${info.label || id}${keyState}</option>`;
        }).join('');
        ui.optimizerProvider.value = ids.includes(promptOptimizerConfig.provider)
          ? promptOptimizerConfig.provider : (ids[0] || 'deepseek');
        populateOptimizerModels();
      }

      function populateOptimizerModels() {
        const info = optimizerProviderInfo(ui.optimizerProvider.value);
        const models = info.models || [info.default_model || promptOptimizerConfig.model || 'deepseek-chat'];
        ui.optimizerModel.innerHTML = models.map(model => `<option value="${model}">${model}</option>`).join('');
        const preferred = ui.optimizerProvider.value === promptOptimizerConfig.provider
          ? promptOptimizerConfig.model : info.default_model;
        ui.optimizerModel.value = models.includes(preferred) ? preferred : models[0];
      }

      function refreshOptimizerUi() {
        const ok = serverSupportsPromptOptimizer();
        if (!ui.optimizerProvider.options.length) populateOptimizerProviders();
        const info = optimizerProviderInfo(ui.optimizerProvider.value);
        ui.toggleOptimizer.disabled = !ok;
        ui.toggleOptimizer.title = ok
          ? `连接 ${info.base_url || promptOptimizerConfig.base_url || '模型 API'} · ${ui.optimizerModel.value}`
          : '需要重启 GUI（api_version ≥ 10）后才可使用';
        updateOptimizerStatus(
          ok
            ? `API：${info.base_url || promptOptimizerConfig.base_url || '-'} · 模型：${ui.optimizerModel.value}`
            : '当前 GUI 服务不支持提示词优化，请重启 start_seedance_gui.bat',
          !ok
        );
      }

      async function sendPromptToOptimizer() {
        if (!serverSupportsPromptOptimizer()) {
          alert(`当前服务不支持提示词优化（api v${serverApiVersion || '?'}）。${RESTART_HINT}`);
          return;
        }
        const prompt = ui.prompt.value.trim();
        if (!prompt) {
          alert(`${shotTaskLabel(index)}: 请先填写 Prompt`);
          return;
        }
        ui.sendOptimizer.disabled = true;
        ui.applyOptimizer.disabled = true;
        const provider = ui.optimizerProvider.value;
        const model = ui.optimizerModel.value;
        const providerLabel = (optimizerProviderInfo(provider).label || provider);
        updateOptimizerStatus(`正在通过 ${providerLabel} API 分析提示词…`, false);
        try {
          const res = await fetch('/api/prompt/optimize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              provider,
              model,
              prompt,
              instruction: ui.optimizerInstruction.value,
              task_label: shotTaskLabel(index),
              duration: Number(ui.duration.value) || DEFAULT_DURATION,
              generation_mode: ui.genMode.value,
              reference_count: referenceTotalCount(),
            }),
          });
          const data = await parseApiJson(res);
          if (!res.ok || !data.ok) {
            throw new Error(data.error || '提示词优化失败');
          }
          ui.optimizerOutput.value = data.content || '';
          updateOptimizerStatus(`完成：${data.provider || provider} · ${data.model || model}`, false);
        } catch (err) {
          updateOptimizerStatus(err.message, true);
          alert('提示词优化失败：' + err.message);
        } finally {
          ui.sendOptimizer.disabled = false;
          ui.applyOptimizer.disabled = false;
        }
      }

      async function generateImage() {
        if (!serverSupportsImageGeneration()) {
          alert(`当前服务不支持图片生成（api v${serverApiVersion || '?'}）。${RESTART_HINT}`);
          return;
        }
        const mode = ui.imageGenMode.value || 'text_image';
        const prompt = ui.imageGenPrompt.value.trim();
        if (!prompt) {
          alert('请填写图片生成提示词');
          return;
        }
        const sourcePaths = state.imageSources.map(src => src.path);
        if (mode !== 'text' && !sourcePaths.length) {
          alert('请先上传图生图参考图');
          return;
        }
        ui.generateImageBtn.disabled = true;
        ui.addGeneratedToRefsBtn.disabled = true;
        const refHint = sourcePaths.length > 1 ? `（${sourcePaths.length} 张参考图）` : '';
        const provider = ui.imageGenProvider.value || 'gemini';
        updateImageGenStatus(`正在生成图片${refHint}，请稍候…`, false);
        try {
          const res = await fetch('/api/image/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              lane_id: laneId,
              mode,
              provider: provider,
              model: ui.imageGenModel.value,
              prompt,
              source_images: sourcePaths,
              source_image: sourcePaths[sourcePaths.length - 1] || '',
            }),
          });
          const data = await parseApiJson(res);
          if (!res.ok || !data.ok) {
            throw new Error(data.error || '图片生成失败');
          }
          state.generatedImages = (data.images || []).map(item => ({
            path: item.path,
            kind: 'image',
            name: item.name || 'generated.png',
            preview: item.preview_url || mediaUrl(item.path),
          }));
          renderGeneratedImages();
          const srcCount = data.source_count || sourcePaths.length;
          const countNote = srcCount > 1 ? ` · ${srcCount} 张参考` : '';
          updateImageGenStatus(`完成：${data.model || ui.imageGenModel.value}${countNote}`, false);
          persistSoon();
        } catch (err) {
          updateImageGenStatus(err.message, true);
          alert('图片生成失败：' + err.message);
        } finally {
          ui.generateImageBtn.disabled = false;
          if (state.generatedImages.length) ui.addGeneratedToRefsBtn.disabled = false;

          return `<div class="ref-card">

      async function deleteUploadedPath(path) {
        const res = await fetch('/api/upload/delete', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '删除失败');
      }

      function collectFilesFromClipboard(clipboardData) {
        const files = [];
        if (!clipboardData) return files;
        for (const item of clipboardData.items) {
          const type = item.type || '';
          if (item.kind !== 'file' && !type.startsWith('image/')) continue;
          const blob = item.getAsFile();
          if (!blob) continue;
          const ext = type.startsWith('video/') || blob.type.startsWith('video/') ? '.mp4'
            : type.includes('jpeg') || blob.type.includes('jpeg') ? '.jpg'
            : type.includes('webp') || blob.type.includes('webp') ? '.webp' : '.png';
          const name = blob.name || `pasted-${Date.now()}${files.length}${ext}`;
          files.push(new File([blob], name, { type: blob.type || type || 'application/octet-stream' }));
        }
        return files;
      }

      async function addReferenceFiles(files) {
        if (!files.length) return false;
        const counts = refCounts();
        let newImages = 0;
        let newVideos = 0;
        for (const f of files) {
          const isVideo = /\.(mp4|mov|webm)$/i.test(f.name) || (f.type || '').startsWith('video/');
          if (isVideo) newVideos += 1;
          else newImages += 1;
        }
        if (counts.images + newImages > 9) {
          alert('参考图片最多 9 个');
          return false;
        }
        if (counts.videos + newVideos > 3) {
          alert('参考视频最多 3 个');
          return false;
        }
        for (const f of files) {
          state.uploadedReferences.push(await uploadFile(f));
        }
        renderRefPreview();
        persistSoon();
        return true;
      }

      async function uploadFile(file) {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        const base64 = String(dataUrl).split(',')[1] || '';
        const res = await fetch('/api/upload', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: file.name, data: base64 }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '上传失败');
        return { path: data.path, kind: data.kind || 'image', name: file.name, preview: mediaUrl(data.path) };
      }

      function filterClipboardImages(files) {
        return files.filter(f => !(f.type || '').startsWith('video/') && !/\.(mp4|mov|webm)$/i.test(f.name));
      }

      async function readClipboardImageFiles(clipboardData) {
        let files = filterClipboardImages(collectFilesFromClipboard(clipboardData));
        if (files.length) return files;
        if (navigator.clipboard && navigator.clipboard.read) {
          try {
            const items = await navigator.clipboard.read();
            for (const item of items) {
              for (const type of ['image/png', 'image/jpeg', 'image/webp']) {
                if (!item.types.includes(type)) continue;
                const blob = await item.getType(type);
                const ext = type === 'image/jpeg' ? 'jpg' : type.split('/')[1];
                files.push(new File([blob], `pasted-${Date.now()}.${ext}`, { type }));
                return files;
              }
            }
          } catch (err) {
            if (err.name !== 'NotAllowedError') throw err;
          }
        }
        return files;
      }

      let hoverPasteZone = null;

      function resolvePasteZoneAt(x, y) {
        const el = document.elementFromPoint(x, y);
        if (!el || !laneRoot.contains(el)) return null;
        if (el.closest('[data-paste-zone="image"]')) return 'image';
        if (el.closest('[data-paste-zone="video"]')) return 'video';
        return null;
      }

      function updatePasteZoneHighlight(zone) {
        side.classList.toggle('paste-zone-hot', zone === 'video');
        ui.imageGenPanel.classList.toggle('paste-zone-hot', zone === 'image');
      }

      laneRoot.addEventListener('mousemove', (e) => {
        const zone = resolvePasteZoneAt(e.clientX, e.clientY);
        if (zone === hoverPasteZone) return;
        hoverPasteZone = zone;
        updatePasteZoneHighlight(zone);
      });
      laneRoot.addEventListener('mouseleave', (e) => {
        if (laneRoot.contains(e.relatedTarget)) return;
        hoverPasteZone = null;
        updatePasteZoneHighlight(null);
      });

      pasteLaneHandlers.push({
        resolveZone: resolvePasteZoneAt,
        readImages: readClipboardImageFiles,
        apply: applyPasteToZone,
      });

      async function applyPasteToZone(zone, files) {
        if (zone === 'image') {
          for (const f of files) {
            await setImageGenSourceFromFile(f);

      async function runJob(mode) {
        const prompt = ui.prompt.value.trim();
        const generationMode = ui.genMode.value;
        const references = state.uploadedReferences.map(i => i.path);
        const start_frame = state.startFrame ? state.startFrame.path : '';
        const end_frame = state.endFrame ? state.endFrame.path : '';
        const ratio = (ui.ratio.value || '9:16').trim();
        if (!prompt) { alert(`${shotTaskLabel(index)}: 请填写 Prompt`); return; }
        if (generationMode === 'reference' && !references.length) {
          alert(`${shotTaskLabel(index)}: 请上传参考`); return;
        }
        if (generationMode === 'keyframes' && (!start_frame || !end_frame)) {
          alert(`${shotTaskLabel(index)}: 请上传首帧和尾帧`); return;
        }
        const res = await fetch('/api/run', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            lane: laneId, mode, asset: ui.asset.value,
            duration: Number(ui.duration.value) || DEFAULT_DURATION,
            ratio,
            prompt, generation_mode: generationMode,
            references, start_frame, end_frame,
          }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) alert(data.error || '启动失败');
      }

      ui.dryBtn.onclick = () => runJob('dry');
      ui.generateBtn.onclick = () => runJob('generate');

      function previewDownloadName(url) {
        try {
          const parsed = new URL(url, window.location.href);
          const relPath = parsed.searchParams.get('path') || parsed.pathname;
          const filename = decodeURIComponent(relPath.split('/').pop() || '').trim();
          if (filename) return filename;
        } catch {}
        const ep = findEpisode(activeEpisodeId);
        return `${ep ? taskOutputSlug(ep, index) : laneId}.mp4`;
      }

      function setPreview(url) {

          ui.previewDownload.download = previewDownloadName(url);
          ui.previewDownload.hidden = false;

        ui.preview.load();

            duration: Number(ui.duration.value) || DEFAULT_DURATION,
            ratio: ui.ratio.value || '9:16',
            references: state.uploadedReferences.map(({ path, kind, name }) => ({ path, kind, name })),
            start_frame: state.startFrame
              ? { path: state.startFrame.path, kind: state.startFrame.kind, name: state.startFrame.name } : null,
            end_frame: state.endFrame
              ? { path: state.endFrame.path, kind: state.endFrame.kind, name: state.endFrame.name } : null,
            image_gen_mode: ui.imageGenMode.value || 'text_image',
            image_gen_prompt: ui.imageGenPrompt.value,
            image_gen_model: ui.imageGenModel.value,
            image_gen_provider: ui.imageGenProvider.value,
            image_gen_sources: state.imageSources.map(({ path, kind, name }) => ({ path, kind, name })),
            image_gen_generated: state.generatedImages.map(({ path, kind, name }) => ({ path, kind, name })),
          };
        },
        updateJob(job) {
          let phase = job.phase || (job.running ? 'running' : 'idle');
          if (phase === 'skipped') phase = 'failed';
          let text = job.status_text || '就绪';
          if (job.mode === 'generate' || job.running) {
            if (job.running && !job.api_sent) text = job.status_text || 'API：编码/提交中…｜视频：等待';
            else if (job.running && job.api_sent) text = 'API：已发送｜视频：生成中';
            else if (job.video_status === 'success') text = job.status_text || 'API：已发送｜视频：成功';
            else if (job.video_status === 'failed') text = job.status_text || 'API：已发送｜视频：失败';
          }
          ui.genStatus.textContent = text;
          ui.genStatus.className = 'gen-status phase-' + phase;
          ui.dryBtn.disabled = !!job.running;
          ui.generateBtn.disabled = !!job.running;
          if (job.preview_url) setPreview(job.preview_url);
          refreshOutputLabel(job);
          if (ui.runLog) {
            ui.runLog.textContent = job.log || '（等待任务…）';
            if (ui.runLogWrap) ui.runLogWrap.scrollTop = ui.runLogWrap.scrollHeight;

              image_gen_model: '',
              image_gen_sources: [],
              image_gen_generated: [],
            }],
            publish_profile: defaultPublishProfile(),
          });
          if (await saveWorkspace()) {
            renderEpisodeBoard();
            return;
          }
          alert('创建接口不可用。' + RESTART_HINT);
          return;
        }
        if (!res.ok || !data.ok) {
          alert(data.error || `创建集数失败 (${res.status})`);
          return;
        }
        if (data.workspace) workspace = data.workspace;
        else if (data.episode) workspace.episodes.push(data.episode);
        renderEpisodeBoard();
        setSaveHint('已保存到本地', 'saved');
      } catch (err) {
        alert('创建集数失败：' + err.message);
      }
    }

    async function loadConfig() {
      const res = await fetch('/api/config');
      configData = await res.json();
      if (!configData.defaults.duration) configData.defaults.duration = DEFAULT_DURATION;
    }

    async function loadWorkspace() {
      const res = await fetch('/api/workspace');
      let data = {};
      try { data = await res.json(); } catch { data = {}; }
      if (res.status === 404 || !res.ok || !data.ok) {
        throw new Error(res.status === 404 ? 'workspace_api_missing' : '加载工作区失败');
      }
      workspace = data.workspace;
      if (!workspace.episodes || !workspace.episodes.length) {
        workspace = defaultClientWorkspace();
      }
      workspace.episodes.forEach(ep => ensureEpisodePublishProfile(ep));
      return data.jobs || {};
    }

    async function poll() {
      if (!activeEpisodeId || !activeLaneCtrls.length) return;
      const res = await fetch('/api/jobs');
      const jobs = await res.json();
      for (const ctrl of activeLaneCtrls) {
        ctrl.updateJob(jobs[ctrl.laneId] || {
          running: false, returncode: null, phase: 'idle', status_text: '就绪',
        });
      }
    }

    function initPublishPanelEvents() {
      const saveBtn = document.getElementById('publishSaveBtn');
      const checkBtn = document.getElementById('publishCheckBtn');
      const exportBtn = document.getElementById('publishExportBtn');
      const panel = document.getElementById('publishPanel');
      if (!panel || !saveBtn || !checkBtn || !exportBtn) return;

      panel.addEventListener('change', (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.matches('input,select,textarea')) {
          savePublishProfileLocal();
        }
      });
      panel.addEventListener('input', (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.matches('input,textarea')) {
          savePublishProfileLocal();
        }
      });
      saveBtn.addEventListener('click', async () => {
        try {
          await savePublishProfileRemote();
        } catch (err) {
          alert(`保存平台配置失败：${err.message}`);
        }
      });
      checkBtn.addEventListener('click', async () => {
        try {
          await runPublishPrecheck();
        } catch (err) {
          alert(`平台预检失败：${err.message}`);
        }
      });
      exportBtn.addEventListener('click', async () => {
        try {
          await exportPublishPackage();
        } catch (err) {
          alert(`导出发布包失败：${err.message}`);
        }
      });
    }

    document.getElementById('addEpisodeBtn').addEventListener('click', () => addEpisode());
    document.getElementById('addLaneBtn').addEventListener('click', () => addTaskPanel());
    document.getElementById('backToEpisodes').addEventListener('click', () => leaveEpisode());
    document.getElementById('editActiveEpisode').addEventListener('click', () => {
      if (activeEpisodeId) editEpisode(activeEpisodeId);
    });
    document.getElementById('concatPreviewBtn').addEventListener('click', () => concatPreview());
    document.getElementById('concatRenderBtn').addEventListener('click', () => concatRender());
    document.getElementById('auditBtn').addEventListener('click', () => episodeAudit());
    document.getElementById('concatResetBtn').addEventListener('click', () => resetTimelineOrder());
    initImageLightbox();
    initEpisodeModal();
    initEpisodeDragDrop();
    initPublishPanelEvents();

    (async function boot() {
      const apiOk = await checkServerApi();
      updateConcatButtonState();
      const verEl = document.getElementById('serverVer');
      if (verEl) {
        if (serverApiVersion >= 7) {
          verEl.textContent = `服务 v${serverApiVersion} ✓`;
          verEl.style.color = '#15803d';
        } else {
          verEl.textContent = `服务 v${serverApiVersion || '?'}（过旧，请重启 bat）`;
          verEl.style.color = '#b45309';
        }
      }
      try {
        await loadConfig();
      } catch (err) {
        console.error(err);
        setSaveHint('配置加载失败', '');
      }
      if (!apiOk) {
        alert('检测到 GUI 服务版本过旧或未完整启动（需要 api_version≥5）。\n\n' + RESTART_HINT);
      }
      let jobs = {};
      try {
        jobs = await loadWorkspace();
      } catch (err) {
        console.error(err);
        workspace = defaultClientWorkspace();
        setSaveHint('请重启 GUI 服务后刷新', 'saving');
      }
      renderEpisodeBoard();
      if (workspace.active_episode_id && findEpisode(workspace.active_episode_id)) {
        enterEpisode(workspace.active_episode_id);
        for (const ctrl of activeLaneCtrls) {
          ctrl.updateJob(jobs[ctrl.laneId] || { running: false, phase: 'idle', status_text: '就绪' });
        }
      } else {
        showEpisodeView();
      }
      setInterval(poll, 1000);
      poll();
    })();
  </script>
</body>
</html>
